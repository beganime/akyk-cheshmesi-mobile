<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Akyl Cheshmesi — Контакты</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/css/inter@latest/latin-400-normal.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/css/inter@latest/latin-500-normal.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/css/inter@latest/latin-600-normal.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/css/inter@latest/latin-700-normal.css">

<style>
  :root {
    /* ТЕМНАЯ ТЕМА (по умолчанию) */
    --bg-app: #000000;
    --bg-header: #0a0a0a;
    --bg-card: rgba(20, 20, 20, 0.6);
    --bg-card-hover: rgba(30, 30, 30, 0.8);
    --bg-input: rgba(255, 255, 255, 0.04);
    --bg-nav: #0a0a0a;
    
    --accent: #10b981;
    --accent-hover: #34d399;
    --accent-dark: #047857;
    --accent-glow: rgba(16, 185, 129, 0.15);
    
    --text-primary: #ffffff;
    --text-secondary: #9ca3af;
    --text-muted: #6b7280;
    
    --border: rgba(255, 255, 255, 0.08);
    --border-accent: rgba(16, 185, 129, 0.3);
    --shadow: rgba(0, 0, 0, 0.5);
    --danger: #ef4444;
  }

  [data-theme="light"] {
    /* СВЕТЛАЯ ТЕМА */
    --bg-app: #f8faf9;
    --bg-header: #ffffff;
    --bg-card: rgba(255, 255, 255, 0.8);
    --bg-card-hover: rgba(255, 255, 255, 0.95);
    --bg-input: rgba(0, 0, 0, 0.04);
    --bg-nav: #ffffff;
    
    --accent: #059669;
    --accent-hover: #10b981;
    --accent-dark: #047857;
    --accent-glow: rgba(5, 150, 105, 0.15);
    
    --text-primary: #0f172a;
    --text-secondary: #475569;
    --text-muted: #94a3b8;
    
    --border: rgba(0, 0, 0, 0.08);
    --border-accent: rgba(5, 150, 105, 0.3);
    --shadow: rgba(0, 0, 0, 0.08);
    --danger: #ef4444;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background-color: #000;
    color: var(--text-primary);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    transition: background-color 0.3s ease;
  }

  [data-theme="light"] body {
    background-color: #e2e8f0;
  }

  .app-container {
    width: 100%;
    max-width: 480px;
    height: 100vh;
    max-height: 900px;
    background-color: var(--bg-app);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: background-color 0.3s ease;
  }

  @media (min-width: 481px) {
    .app-container {
      height: 90vh;
      border-radius: 28px;
      box-shadow: 0 20px 60px var(--shadow), 0 0 0 1px var(--border);
    }
  }

  /* HEADER */
  .header {
    padding: 20px 20px 16px;
    background-color: var(--bg-header);
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background-color 0.3s ease, border-color 0.3s ease;
  }

  .header-left {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .header-title {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header-subtitle {
    font-size: 13px;
    color: var(--text-secondary);
  }

  .theme-toggle {
    width: 44px;
    height: 44px;
    border-radius: 14px;
    background-color: var(--bg-input);
    border: 1.5px solid var(--border);
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.25s ease;
    flex-shrink: 0;
  }

  .theme-toggle:hover {
    background-color: var(--bg-card-hover);
    color: var(--accent);
    border-color: var(--border-accent);
    transform: translateY(-2px);
  }

  .theme-toggle:active {
    transform: translateY(0) scale(0.95);
  }

  .theme-toggle svg {
    width: 22px;
    height: 22px;
  }

  .theme-toggle .icon-moon,
  [data-theme="light"] .theme-toggle .icon-sun {
    display: none;
  }

  [data-theme="light"] .theme-toggle .icon-moon {
    display: block;
  }

  /* SEARCH */
  .search-container {
    padding: 16px 20px;
    background-color: var(--bg-header);
    transition: background-color 0.3s ease;
  }

  .search-input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }

  .search-icon {
    position: absolute;
    left: 16px;
    width: 18px;
    height: 18px;
    color: var(--text-muted);
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    padding: 14px 16px 14px 46px;
    background-color: var(--bg-input);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    color: var(--text-primary);
    font-family: inherit;
    font-size: 15px;
    outline: none;
    transition: all 0.25s ease;
  }

  .search-input::placeholder {
    color: var(--text-muted);
  }

  .search-input:focus {
    border-color: var(--accent);
    background-color: var(--accent-glow);
    box-shadow: 0 0 0 4px var(--accent-glow);
  }

  /* CONTACTS LIST */
  .contacts-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 20px 100px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .contacts-list::-webkit-scrollbar {
    width: 4px;
  }
  .contacts-list::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 4px;
  }

  .section-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 12px 4px 8px;
  }

  /* CONTACT CARD */
  .contact-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background-color: var(--bg-card);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 18px;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .contact-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  }

  [data-theme="light"] .contact-card::before {
    background: linear-gradient(90deg, transparent, rgba(0,0,0,0.05), transparent);
  }

  .contact-card:hover {
    background-color: var(--bg-card-hover);
    border-color: var(--border-accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px var(--shadow), 0 0 0 1px var(--border-accent);
  }

  .contact-card:active {
    transform: translateY(0);
  }

  .contact-avatar {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 18px;
    color: #fff;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    position: relative;
  }

  .contact-avatar.online::after {
    content: '';
    position: absolute;
    bottom: 2px;
    right: 2px;
    width: 12px;
    height: 12px;
    background-color: var(--accent);
    border: 2px solid var(--bg-app);
    border-radius: 50%;
  }

  .contact-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .contact-name {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .contact-meta {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .contact-username {
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .contact-phone {
    font-size: 12px;
    color: var(--text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .contact-last-seen {
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
    text-align: right;
  }

  .contact-last-seen.online {
    color: var(--accent);
    font-weight: 500;
  }

  /* EMPTY STATE */
  .empty-state {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    text-align: center;
    color: var(--text-secondary);
  }

  .empty-state.show {
    display: flex;
  }

  .empty-state svg {
    width: 64px;
    height: 64px;
    color: var(--text-muted);
    margin-bottom: 16px;
    opacity: 0.5;
  }

  .empty-state-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 6px;
  }

  .empty-state-text {
    font-size: 14px;
  }

  /* BOTTOM NAV */
  .bottom-nav {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 72px;
    background-color: var(--bg-nav);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-around;
    align-items: center;
    z-index: 20;
    padding-bottom: env(safe-area-inset-bottom);
    transition: background-color 0.3s ease, border-color 0.3s ease;
  }

  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    color: var(--text-muted);
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: color 0.2s;
    padding: 8px 12px;
    position: relative;
  }

  .nav-item:hover {
    color: var(--text-secondary);
  }

  .nav-item.active {
    color: var(--accent);
  }

  .nav-item.active::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 24px;
    height: 2px;
    background-color: var(--accent);
    border-radius: 2px;
  }

  .nav-item svg {
    width: 24px;
    height: 24px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background-color: var(--bg-header);
    color: var(--text-primary);
    padding: 12px 24px;
    border-radius: 16px;
    font-size: 14px;
    font-weight: 500;
    box-shadow: 0 8px 24px var(--shadow);
    border: 1px solid var(--border-accent);
    z-index: 200;
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    pointer-events: none;
    white-space: nowrap;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* ANIMATIONS */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .contact-card {
    animation: fadeIn 0.3s ease backwards;
  }
</style>
</head>
<body>

<div class="app-container">
  
  <!-- Header с переключателем темы -->
  <header class="header">
    <div class="header-left">
      <h1 class="header-title">Контакты</h1>
      <div class="header-subtitle" id="contactsCount">5 контактов</div>
    </div>
    <button class="theme-toggle" id="themeToggle" aria-label="Переключить тему">
      <!-- Иконка солнца (для темной темы) -->
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

        <line x1="1" y1="12" x2="3" y2="12"/>

        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <!-- Иконка луны (для светлой темы) -->
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </header>

  <!-- Search -->
  <div class="search-container">
    <div class="search-input-wrapper">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" class="search-input" id="searchInput" placeholder="Поиск по номеру телефона или никнейму">

  </div>

  <!-- Contacts List -->
  <div class="contacts-list" id="contactsList">
    <div class="section-label">Все контакты</div>
  </div>

  <!-- Empty State -->
  <div class="empty-state" id="emptyState">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      <line x1="8" y1="11" x2="14" y2="11"/>
    </svg>
    <div class="empty-state-title">Ничего не найдено</div>
    <div class="empty-state-text">Попробуйте изменить запрос</div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <div class="nav-item" data-tab="chats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
      </svg>
      <span>Чаты</span>
    </div>
    <div class="nav-item active" data-tab="contacts">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <span>Контакты</span>
    </div>
    <div class="nav-item" data-tab="ai">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="10" rx="2"/>
        <circle cx="12" cy="5" r="2"/>
        <path d="M12 7v4"/>
        <line x1="8" y1="16" x2="8.01" y2="16"/>
        <line x1="16" y1="16" x2="16.01" y2="16"/>
      </svg>
      <span>ИИ</span>
    </div>
    <div class="nav-item" data-tab="news">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/>
        <path d="M18 14h-8"/>
        <path d="M15 18h-5"/>
        <path d="M10 6h8v4h-8V6Z"/>
      </svg>
      <span>Новости</span>
    </div>
    <div class="nav-item" data-tab="profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span>Профиль</span>
    </div>
  </nav>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

</div>

<script>
  // =========================================
  // ДАННЫЕ КОНТАКТОВ
  // =========================================
  const contacts = [
    {
      id: 1,
      name: 'Бегенч Ягмуров',
      username: '@begench',
      phone: '+7 (999) 123-45-67',
      online: true,
      lastSeen: 'в сети'
    },
    {
      id: 2,
      name: 'Мария Иванова',
      username: '@maria_iv',
      phone: '+7 (916) 555-22-11',
      online: true,
      lastSeen: 'в сети'
    },
    {
      id: 3,
      name: 'Алексей Петров',
      username: '@alex_p',
      phone: '+7 (903) 777-88-99',
      online: false,
      lastSeen: 'был(а) 2 часа назад'
    },
    {
      id: 4,
      name: 'Дмитрий Соколов',
      username: '@dmitry_s',
      phone: '+7 (925) 333-44-55',
      online: false,
      lastSeen: 'был(а) вчера'
    },
    {
      id: 5,
      name: 'Анна Ким',
      username: '@anna_kim',
      phone: '+7 (909) 111-22-33',
      online: true,
      lastSeen: 'в сети'
    }
  ];

  // =========================================
  // ЭЛЕМЕНТЫ DOM
  // =========================================
  const searchInput = document.getElementById('searchInput');
  const contactsList = document.getElementById('contactsList');
  const emptyState = document.getElementById('emptyState');
  const contactsCount = document.getElementById('contactsCount');
  const toast = document.getElementById('toast');
  const themeToggle = document.getElementById('themeToggle');
  const html = document.documentElement;

  let toastTimeout;

  // =========================================
  // ПЕРЕКЛЮЧЕНИЕ ТЕМЫ
  // =========================================
  function setTheme(theme) {
    html.setAttribute('data-theme', theme);
    localStorage.setItem('akyl_theme', theme);
  }

  function initTheme() {
    const savedTheme = localStorage.getItem('akyl_theme');
    if (savedTheme) {
      setTheme(savedTheme);
    } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
      setTheme('light');
    } else {
      setTheme('dark');
    }
  }

  themeToggle.addEventListener('click', () => {
    const currentTheme = html.getAttribute('data-theme');
    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
    setTheme(newTheme);
    showToast(newTheme === 'light' ? 'Включен дневной режим' : 'Включен ночной режим');
  });

  // =========================================
  // РЕНДЕРИНГ КОНТАКТОВ
  // =========================================
  function getInitials(name) {
    return name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
  }

  function renderContacts(filteredContacts) {
    // Очищаем список, оставляя label
    const existingCards = contactsList.querySelectorAll('.contact-card');
    existingCards.forEach(card => card.remove());

    if (filteredContacts.length === 0) {
      emptyState.classList.add('show');
      contactsCount.textContent = '0 контактов';
      return;
    }

    emptyState.classList.remove('show');
    contactsCount.textContent = `${filteredContacts.length} ${getContactsWord(filteredContacts.length)}`;

    filteredContacts.forEach((contact, index) => {
      const card = document.createElement('div');
      card.className = 'contact-card';
      card.style.animationDelay = `${index * 0.05}s`;
      card.dataset.contactId = contact.id;

      card.innerHTML = `
        <div class="contact-avatar ${contact.online ? 'online' : ''}">
          ${getInitials(contact.name)}
        </div>
        <div class="contact-info">
          <div class="contact-name">${contact.name}</div>
          <div class="contact-meta">
            <div class="contact-username">${contact.username}</div>
            <div class="contact-phone">${contact.phone}</div>
          </div>
        </div>
        <div class="contact-last-seen ${contact.online ? 'online' : ''}">
          ${contact.lastSeen}
        </div>
      `;

      // Клик по карточке
      card.addEventListener('click', () => {
        showToast(`Открыт профиль: ${contact.name}`);
      });

      contactsList.appendChild(card);
    });
  }

  function getContactsWord(count) {
    const mod10 = count % 10;
    const mod100 = count % 100;
    if (mod10 === 1 && mod100 !== 11) return 'контакт';
    if ([2, 3, 4].includes(mod10) && ![12, 13, 14].includes(mod100)) return 'контакта';
    return 'контактов';
  }

  // =========================================
  // ЛОГИКА ПОИСКА (только телефон или никнейм)
  // =========================================
  function filterContacts(query) {
    const q = query.toLowerCase().trim();
    
    if (!q) return contacts;

    return contacts.filter(contact => {
      // Поиск по телефону (содержит цифры запроса)
      const phoneMatch = contact.phone.toLowerCase().includes(q);
      // Поиск по никнейму
      const usernameMatch = contact.username.toLowerCase().includes(q);
      
      return phoneMatch || usernameMatch;
    });
  }

  searchInput.addEventListener('input', (e) => {
    const query = e.target.value;
    const filtered = filterContacts(query);
    renderContacts(filtered);
  });

  // =========================================
  // НАВИГАЦИЯ
  // =========================================
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      item.classList.add('active');
      
      const tab = item.dataset.tab;
      if (tab !== 'contacts') {
        showToast(`Раздел "${item.querySelector('span').textContent}" в разработке`);
      }
    });
  });

  // =========================================
  // TOAST
  // =========================================
  function showToast(message) {
    clearTimeout(toastTimeout);
    toast.textContent = message;
    toast.classList.add('show');
    
    toastTimeout = setTimeout(() => {
      toast.classList.remove('show');
    }, 2500);
  }

  // =========================================
  // ИНИЦИАЛИЗАЦИЯ
  // =========================================
  initTheme();
  renderContacts(contacts);
</script>

</body>
</html>
