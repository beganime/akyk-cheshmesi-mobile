<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Akyl Cheshmesi — Чат</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/css/inter@latest/latin-400-normal.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/css/inter@latest/latin-500-normal.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/css/inter@latest/latin-600-normal.css">

<style>
  :root {
    --bg-chat: #000000;
    --bg-header: #111111;
    --bg-input: #111111;
    
    --msg-in: #059669;
    --msg-out: #047857;
    
    --text-primary: #ffffff;
    --text-secondary: #888888;
    --accent: #10b981;
    --separator: rgba(255, 255, 255, 0.1);
    --shadow: rgba(0, 0, 0, 0.5);
    --danger: #ef4444;
  }

  [data-theme="light"] {
    --bg-chat: #f0fdf4;
    --bg-header: #ffffff;
    --bg-input: #ffffff;
    
    --msg-in: #34d399;
    --msg-out: #10b981;
    
    --text-primary: #064e3b;
    --text-secondary: #6b7280;
    --accent: #059669;
    --separator: rgba(0, 0, 0, 0.08);
    --shadow: rgba(0, 0, 0, 0.1);
    --danger: #ef4444;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background-color: #000;
    color: var(--text-primary);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .app-container {
    width: 100%;
    max-width: 480px;
    height: 100vh;
    max-height: 900px;
    background-color: var(--bg-chat);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: background-color 0.3s ease;
  }

  @media (min-width: 481px) {
    .app-container {
      height: 90vh;
      border-radius: 24px;
      box-shadow: 0 20px 60px var(--shadow);
      border: 1px solid var(--separator);
    }
  }

  .chat-header {
    display: flex;
    align-items: center;
    padding: 10px 16px;
    background-color: var(--bg-header);
    border-bottom: 1px solid var(--separator);
    z-index: 20;
    gap: 12px;
  }

  .back-btn, .action-btn {
    background: none;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    padding: 4px;
    display: flex;
  }

  .action-btn:hover { color: var(--accent); }
  .action-btn svg { width: 22px; height: 22px; }

  .user-info {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
  }

  .user-avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #064e3b);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 16px;
    color: #fff;
    flex-shrink: 0;
  }

  .user-details { display: flex; flex-direction: column; }
  .user-name { font-size: 16px; font-weight: 600; color: var(--text-primary); }
  .user-status { font-size: 13px; color: var(--text-secondary); }

  .header-actions { display: flex; gap: 16px; align-items: center; }

  .messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    background-color: #000000;
  }

  .messages-area::-webkit-scrollbar { width: 4px; }
  .messages-area::-webkit-scrollbar-thumb { background: var(--separator); border-radius: 4px; }

  .message {
    max-width: 75%;
    padding: 8px 12px;
    border-radius: 16px;
    position: relative;
    font-size: 14px;
    line-height: 1.3;
    word-wrap: break-word;
    animation: msgPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    color: #ffffff;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  }

  @keyframes msgPop {
    from { opacity: 0; transform: scale(0.95) translateY(5px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .message.in { 
    align-self: flex-start; 
    background-color: var(--msg-in); 
    border-bottom-left-radius: 4px; 
  }
  
  .message.out { 
    align-self: flex-end; 
    background-color: var(--msg-out); 
    border-bottom-right-radius: 4px; 
  }

  .message img.msg-image {
    max-width: 100%;
    border-radius: 10px;
    margin-bottom: 4px;
    display: block;
  }

  .msg-meta {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 4px;
    margin-top: 2px;
    font-size: 10px;
    color: rgba(255, 255, 255, 0.7);
  }

  .input-area {
    background-color: var(--bg-input);
    padding: 8px 12px;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    border-top: 1px solid var(--separator);
    position: relative;
    z-index: 10;
  }

  .attach-btn, .photo-btn {
    background: none;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    padding: 8px;
    display: flex;
    transition: color 0.2s, transform 0.1s;
  }

  .attach-btn:hover, .photo-btn:hover { color: var(--accent); }
  .attach-btn:active, .photo-btn:active { transform: scale(0.9); }
  .attach-btn svg, .photo-btn svg { width: 24px; height: 24px; }

  .input-wrapper {
    flex: 1;
    background-color: rgba(255,255,255,0.05);
    border: 1px solid var(--separator);
    border-radius: 24px;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    min-height: 44px;
  }
  
  [data-theme="light"] .input-wrapper { background-color: #f3f4f6; }

  textarea {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text-primary);
    font-family: inherit;
    font-size: 15px;
    resize: none;
    outline: none;
    max-height: 120px;
    min-height: 24px;
    line-height: 1.4;
    padding: 2px 0;
  }

  textarea::placeholder { color: var(--text-secondary); }

  .send-actions { display: flex; align-items: center; gap: 8px; }

  .icon-btn {
    background: none;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    padding: 8px;
    display: flex;
    transition: color 0.2s, transform 0.1s;
  }

  .icon-btn:hover { color: var(--accent); }
  .icon-btn:active { transform: scale(0.9); }
  .icon-btn svg { width: 24px; height: 24px; }
  .send-btn { color: var(--accent); }

  .recording-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.95);
    backdrop-filter: blur(10px);
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .recording-overlay.active { opacity: 1; pointer-events: auto; }

  .rec-timer {
    font-size: 24px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 30px;
    font-variant-numeric: tabular-nums;
  }

  .rec-visualizer {
    display: flex;
    align-items: center;
    gap: 4px;
    height: 40px;
    margin-bottom: 40px;
  }

  .bar {
    width: 4px;
    background-color: var(--accent);
    border-radius: 2px;
    animation: sound 0.5s infinite ease-in-out alternate;
  }

  .bar:nth-child(1) { height: 10px; animation-delay: 0.1s; }
  .bar:nth-child(2) { height: 20px; animation-delay: 0.2s; }
  .bar:nth-child(3) { height: 30px; animation-delay: 0.3s; }
  .bar:nth-child(4) { height: 15px; animation-delay: 0.4s; }
  .bar:nth-child(5) { height: 25px; animation-delay: 0.5s; }

  @keyframes sound {
    0% { height: 10px; opacity: 0.5; }
    100% { height: 35px; opacity: 1; }
  }

  .rec-controls { display: flex; align-items: center; gap: 60px; }

  .control-btn {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.2s, background-color 0.2s;
  }

  .control-btn:active { transform: scale(0.9); }

  .btn-cancel { background-color: rgba(255, 255, 255, 0.1); color: var(--text-secondary); }
  .btn-cancel:hover { background-color: rgba(239, 68, 68, 0.2); color: var(--danger); }

  .btn-send-rec {
    background-color: var(--accent);
    color: white;
    box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
  }

  .btn-send-rec:hover { filter: brightness(1.1); }
  .control-btn svg { width: 24px; height: 24px; }

  .call-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #064e3b 0%, #000000 100%);
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  [data-theme="light"] .call-overlay {
    background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
  }

  .call-overlay.active { opacity: 1; pointer-events: auto; }

  .call-avatar-large {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #064e3b);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 24px;
    position: relative;
    box-shadow: 0 0 30px rgba(16, 185, 129, 0.4);
  }

  .pulse-ring {
    position: absolute;
    inset: -10px;
    border: 2px solid var(--accent);
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0% { transform: scale(1); opacity: 0.8; }
    100% { transform: scale(1.5); opacity: 0; }
  }

  .call-status { font-size: 18px; font-weight: 500; margin-bottom: 8px; color: var(--text-primary); }
  .call-timer { font-size: 14px; color: var(--text-secondary); margin-bottom: 40px; }

  .end-call-btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background-color: var(--danger);
    border: none;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.2s;
    box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
  }

  .end-call-btn:active { transform: scale(0.9); }
  .end-call-btn svg { width: 28px; height: 28px; }

  .sticker-panel {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 300px;
    background-color: var(--bg-header);
    border-top: 1px solid var(--separator);
    z-index: 30;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex;
    flex-direction: column;
  }

  .sticker-panel.active { transform: translateY(0); }

  .sticker-header {
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--separator);
  }

  .sticker-title { font-weight: 600; font-size: 16px; color: var(--text-primary); }
  .close-stickers { background: none; border: none; color: var(--text-secondary); cursor: pointer; }

  .sticker-grid {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    align-content: start;
  }

  .sticker-item {
    aspect-ratio: 1;
    background-color: rgba(255,255,255,0.05);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s;
    border: 1px solid transparent;
  }

  [data-theme="light"] .sticker-item { background-color: rgba(0,0,0,0.05); }
  .sticker-item:hover { transform: scale(1.05); background-color: rgba(255,255,255,0.1); border-color: var(--accent); }
  .sticker-item img { width: 100%; height: 100%; object-fit: cover; }

  .add-sticker-btn {
    border: 2px dashed var(--text-secondary);
    background: transparent;
    color: var(--text-secondary);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    font-size: 12px;
  }

  .add-sticker-btn:hover { border-color: var(--accent); color: var(--accent); }
  .add-sticker-btn svg { width: 24px; height: 24px; }

  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background-color: var(--bg-header);
    color: var(--text-primary);
    padding: 12px 24px;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 500;
    box-shadow: 0 8px 24px var(--shadow);
    border: 1px solid var(--separator);
    z-index: 200;
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    pointer-events: none;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  #fileInput, #cameraInput, #stickerInput { display: none; }
</style>
</head>
<body>

<div class="app-container">
  <header class="chat-header">
    <button class="back-btn" id="backBtn" aria-label="Назад">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </button>
    <div class="user-info">
      <div class="user-avatar">Б</div>
      <div class="user-details">
        <div class="user-name">Бегенч Ягмуров</div>
        <div class="user-status">в сети</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="action-btn" id="themeToggle" aria-label="Сменить тему">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" style="display:none;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="action-btn" id="audioCallBtn" aria-label="Аудиозвонок">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      </button>
      <button class="action-btn" id="videoCallBtn" aria-label="Видеозвонок">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
      </button>
      <button class="action-btn" aria-label="Меню">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
      </button>
    </div>
  </header>

  <div class="messages-area" id="messagesArea">
    <div class="message in">Привет! Как дела?<div class="msg-meta">12:00</div></div>
    <div class="message out">Привет! Все отлично, работаю над новым проектом.<div class="msg-meta">12:01<svg class="msg-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div></div>
    <div class="message in">Круто! Что за проект?<div class="msg-meta">12:02</div></div>
  </div>

  <div class="sticker-panel" id="stickerPanel">
    <div class="sticker-header">
      <span class="sticker-title">Стикеры</span>
      <button class="close-stickers" id="closeStickers">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:24px; height:24px;"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="sticker-grid" id="stickerGrid">
      <div class="sticker-item add-sticker-btn" id="addStickerBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span>Добавить</span>
      </div>
      <div class="sticker-item" onclick="sendSticker('')"><div style="font-size: 32px;"></div></div>
      <div class="sticker-item" onclick="sendSticker('❤️')"><div style="font-size: 32px;">❤️</div></div>
      <div class="sticker-item" onclick="sendSticker('😂')"><div style="font-size: 32px;">😂</div></div>
      <div class="sticker-item" onclick="sendSticker('🔥')"><div style="font-size: 32px;">🔥</div></div>
      <div class="sticker-item" onclick="sendSticker('🎉')"><div style="font-size: 32px;"></div></div>
    </div>
  </div>

  <div class="input-area">
    <!-- Кнопка "+" для отправки фото из галереи -->
    <button class="photo-btn" id="photoBtn" aria-label="Отправить фото">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>
    
    <button class="attach-btn" id="attachBtn" aria-label="Прикрепить файл">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
    </button>
    
    <div class="input-wrapper">
      <textarea id="messageInput" placeholder="Сообщение..." rows="1"></textarea>
    </div>
    <div class="send-actions">
      <button class="icon-btn" id="stickerBtn" aria-label="Стикеры">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
      </button>
      <button class="icon-btn" id="videoCircleBtn" aria-label="Записать видео-кружок">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      </button>
      <button class="icon-btn" id="micBtn" aria-label="Голосовое сообщение">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </button>
      <button class="icon-btn send-btn" id="sendBtn" style="display: none;" aria-label="Отправить">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <div class="recording-overlay" id="recordingOverlay">
    <div class="rec-timer" id="recTimer">00:00</div>
    <div class="rec-visualizer">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
    <div class="rec-controls">
      <button class="control-btn btn-cancel" id="cancelRecBtn" aria-label="Отменить запись">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <button class="control-btn btn-send-rec" id="sendRecBtn" aria-label="Отправить запись">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <div class="call-overlay" id="callOverlay">
    <div class="call-avatar-large">Б<div class="pulse-ring"></div></div>
    <div class="call-status" id="callStatusText">Установка соединения...</div>
    <div class="call-timer" id="callTimer" style="display: none;">00:00</div>
    <button class="end-call-btn" id="endCallBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-3.33-2.67m-2.67-3.34a19.79 19.79 0 0 1-3.07-8.63A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"/><line x1="23" y1="1" x2="1" y2="23"/></svg>
    </button>
  </div>

  <div class="toast" id="toast"></div>

  <input type="file" id="fileInput" accept="image/*">
  <input type="file" id="cameraInput" accept="image/*" capture="environment">
  <input type="file" id="stickerInput" accept="image/*">
</div>

<script>
  const messageInput = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendBtn');
  const micBtn = document.getElementById('micBtn');
  const videoCircleBtn = document.getElementById('videoCircleBtn');
  const attachBtn = document.getElementById('attachBtn');
  const photoBtn = document.getElementById('photoBtn');
  const stickerBtn = document.getElementById('stickerBtn');
  const audioCallBtn = document.getElementById('audioCallBtn');
  const videoCallBtn = document.getElementById('videoCallBtn');
  const backBtn = document.getElementById('backBtn');
  const themeToggle = document.getElementById('themeToggle');
  const messagesArea = document.getElementById('messagesArea');
  const toast = document.getElementById('toast');
  const recordingOverlay = document.getElementById('recordingOverlay');
  const recTimer = document.getElementById('recTimer');
  const cancelRecBtn = document.getElementById('cancelRecBtn');
  const sendRecBtn = document.getElementById('sendRecBtn');
  const callOverlay = document.getElementById('callOverlay');
  const endCallBtn = document.getElementById('endCallBtn');
  const callStatusText = document.getElementById('callStatusText');
  const callTimer = document.getElementById('callTimer');
  const stickerPanel = document.getElementById('stickerPanel');
  const closeStickers = document.getElementById('closeStickers');
  const addStickerBtn = document.getElementById('addStickerBtn');
  const stickerGrid = document.getElementById('stickerGrid');
  const fileInput = document.getElementById('fileInput');
  const cameraInput = document.getElementById('cameraInput');
  const stickerInput = document.getElementById('stickerInput');

  let toastTimeout, recInterval, recSeconds = 0, currentRecType = '';
  let callInterval, callSeconds = 0;

  const iconSun = themeToggle.querySelector('.icon-sun');
  const iconMoon = themeToggle.querySelector('.icon-moon');
  const html = document.documentElement;

  themeToggle.addEventListener('click', () => {
    const currentTheme = html.getAttribute('data-theme');
    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', newTheme);
    if (newTheme === 'light') { iconSun.style.display = 'none'; iconMoon.style.display = 'block'; }
    else { iconSun.style.display = 'block'; iconMoon.style.display = 'none'; }
  });

  messageInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = (this.scrollHeight) + 'px';
    if (this.value.trim().length > 0) {
      sendBtn.style.display = 'flex'; micBtn.style.display = 'none';
      videoCircleBtn.style.display = 'none'; stickerBtn.style.display = 'none';
    } else {
      sendBtn.style.display = 'none'; micBtn.style.display = 'flex';
      videoCircleBtn.style.display = 'flex'; stickerBtn.style.display = 'flex';
    }
  });

  function sendMessage(content, type = 'text') {
    if (!content && type === 'text') return;
    const now = new Date();
    const time = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
    const msgDiv = document.createElement('div');
    msgDiv.className = 'message out';
    let contentHtml = '';
    if (type === 'text') contentHtml = content.replace(/\n/g, '<br>');
    else if (type === 'image') contentHtml = `<img src="${content}" class="msg-image" alt="Photo">`;
    else if (type === 'sticker') { contentHtml = `<div style="font-size: 48px;">${content}</div>`; msgDiv.style.background = 'transparent'; msgDiv.style.padding = '0'; }
    else if (type === 'voice' || type === 'video') contentHtml = `<div style="display:flex; align-items:center; gap:8px;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px; height:20px;"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg><span>${type === 'voice' ? 'Голосовое сообщение' : 'Видео-кружок'}</span></div>`;
    msgDiv.innerHTML = `${contentHtml}<div class="msg-meta">${time}<svg class="msg-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>`;
    messagesArea.appendChild(msgDiv);
    if (type === 'text') {
      messageInput.value = ''; messageInput.style.height = 'auto';
      sendBtn.style.display = 'none'; micBtn.style.display = 'flex';
      videoCircleBtn.style.display = 'flex'; stickerBtn.style.display = 'flex';
    }
    messagesArea.scrollTop = messagesArea.scrollHeight;
  }

  sendBtn.addEventListener('click', () => sendMessage(messageInput.value));
  messageInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(messageInput.value); } });

  function startRecording(type) {
    currentRecType = type; recSeconds = 0; updateRecTimer();
    recordingOverlay.classList.add('active');
    recInterval = setInterval(() => { recSeconds++; updateRecTimer(); }, 1000);
  }

  function stopRecording(send) {
    clearInterval(recInterval); recordingOverlay.classList.remove('active');
    if (send) sendMessage(null, currentRecType); else showToast('Запись удалена');
  }

  function updateRecTimer() {
    const mins = Math.floor(recSeconds / 60).toString().padStart(2, '0');
    const secs = (recSeconds % 60).toString().padStart(2, '0');
    recTimer.textContent = `${mins}:${secs}`;
  }

  micBtn.addEventListener('click', () => startRecording('voice'));
  videoCircleBtn.addEventListener('click', () => startRecording('video'));
  cancelRecBtn.addEventListener('click', () => stopRecording(false));
  sendRecBtn.addEventListener('click', () => stopRecording(true));

  // КНОПКА "+" ДЛЯ ОТПРАВКИ ФОТО ИЗ ГАЛЕРЕИ
  photoBtn.addEventListener('click', () => {
    fileInput.click();
  });

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function(event) {
        sendMessage(event.target.result, 'image');
        showToast('Фото отправлено');
      };
      reader.readAsDataURL(file);
    }
    fileInput.value = '';
  });

  // Скрепка для вложений (двойной клик = камера)
  let lastClick = 0;
  attachBtn.addEventListener('click', (e) => {
    const currentTime = new Date().getTime();
    if (currentTime - lastClick < 300) cameraInput.click();
    lastClick = currentTime;
  });

  cameraInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function(event) {
        sendMessage(event.target.result, 'image');
        showToast('Фото с камеры отправлено');
      };
      reader.readAsDataURL(file);
    }
    cameraInput.value = '';
  });

  stickerBtn.addEventListener('click', () => stickerPanel.classList.add('active'));
  closeStickers.addEventListener('click', () => stickerPanel.classList.remove('active'));

  function sendSticker(content) { sendMessage(content, 'sticker'); stickerPanel.classList.remove('active'); }

  addStickerBtn.addEventListener('click', () => stickerInput.click());
  stickerInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function(event) {
        const newSticker = document.createElement('div');
        newSticker.className = 'sticker-item';
        newSticker.onclick = function() { sendSticker(event.target.result); };
        const img = document.createElement('img');
        img.src = event.target.result;
        newSticker.appendChild(img);
        stickerGrid.insertBefore(newSticker, stickerGrid.children[1]);
        showToast('Стикер добавлен!');
      };
      reader.readAsDataURL(file);
    }
    stickerInput.value = '';
  });

  function startCall(type) {
    callOverlay.classList.add('active');
    callStatusText.textContent = 'Установка соединения...';
    callTimer.style.display = 'none'; callSeconds = 0;
    setTimeout(() => {
      callStatusText.textContent = type; callTimer.style.display = 'block';
      callInterval = setInterval(() => {
        callSeconds++;
        const mins = Math.floor(callSeconds / 60).toString().padStart(2, '0');
        const secs = (callSeconds % 60).toString().padStart(2, '0');
        callTimer.textContent = `${mins}:${secs}`;
      }, 1000);
    }, 2000);
  }

  audioCallBtn.addEventListener('click', () => startCall('Аудиозвонок'));
  videoCallBtn.addEventListener('click', () => startCall('Видеозвонок'));
  endCallBtn.addEventListener('click', () => { clearInterval(callInterval); callOverlay.classList.remove('active'); showToast('Звонок завершен'); });
  backBtn.addEventListener('click', () => showToast('Возврат к списку чатов'));

  function showToast(message) {
    clearTimeout(toastTimeout);
    toast.textContent = message; toast.classList.add('show');
    toastTimeout = setTimeout(() => toast.classList.remove('show'), 2500);
  }

  messagesArea.scrollTop = messagesArea.scrollHeight;
</script>

</body>
</html>
