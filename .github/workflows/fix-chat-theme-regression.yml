name: Fix chat theme regression

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/fix-chat-theme-regression.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch theme leftovers
        run: |
          node <<'NODE'
          const fs = require('fs');

          function replaceExact(source, from, to, label) {
            if (source.includes(to)) return source;
            if (!source.includes(from)) throw new Error(`${label} not found`);
            return source.replace(from, to);
          }

          function patchChats() {
            const path = 'app/(app)/(tabs)/chats.tsx';
            let source = fs.readFileSync(path, 'utf8');

            source = replaceExact(
              source,
              "icon={isLightTheme ? 'moon-outline' : 'sunny-outline'}",
              "icon={theme.isDark ? 'sunny-outline' : 'moon-outline'}",
              'chat theme menu icon',
            );

            source = replaceExact(
              source,
              "label={isLightTheme ? 'Ночной режим' : 'Дневной режим'}",
              "label={theme.isDark ? 'Дневной режим' : 'Ночной режим'}",
              'chat theme menu label',
            );

            if (source.includes('isLightTheme')) {
              throw new Error('chats.tsx still contains isLightTheme');
            }

            fs.writeFileSync(path, source);
          }

          function patchStoriesStrip() {
            const path = 'src/components/stories/StoriesStrip.tsx';
            let source = fs.readFileSync(path, 'utf8');

            if (!source.includes("import type { AppTheme } from '@/src/theme/themes';")) {
              source = replaceExact(
                source,
                "import { useTheme } from '@/src/theme/ThemeProvider';\n",
                "import { useTheme } from '@/src/theme/ThemeProvider';\nimport type { AppTheme } from '@/src/theme/themes';\n",
                'stories theme import',
              );
            }

            if (!source.includes('function buildStoriesStripUi(theme: AppTheme)')) {
              source = source.replace(
                /const UI = \{[\s\S]*?\n\} as const;\n\nfunction getAuthor/,
                `type StoriesStripUi = {\n  bgPrimary: string;\n  bgSecondary: string;\n  accent: string;\n  textPrimary: string;\n  textSecondary: string;\n  separator: string;\n};\n\nfunction buildStoriesStripUi(theme: AppTheme): StoriesStripUi {\n  const colors = theme.colors;\n\n  return {\n    bgPrimary: colors.background,\n    bgSecondary: colors.cardStrong,\n    accent: colors.primary,\n    textPrimary: colors.text,\n    textSecondary: colors.muted,\n    separator: colors.border,\n  };\n}\n\nfunction getAuthor`,
              );
            }

            source = replaceExact(
              source,
              "  const { resolvedThemeName } = useTheme();\n  const isLightTheme = resolvedThemeName.toLowerCase().includes('light');\n  const ui = isLightTheme ? UI.light : UI.dark;",
              "  const { theme } = useTheme();\n  const ui = useMemo(() => buildStoriesStripUi(theme), [theme]);",
              'stories theme usage',
            );

            if (source.includes('resolvedThemeName') || source.includes('isLightTheme ? UI')) {
              throw new Error('StoriesStrip still contains legacy theme selector');
            }

            fs.writeFileSync(path, source);
          }

          patchChats();
          patchStoriesStrip();
          NODE

      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/'(app)'/'(tabs)'/chats.tsx src/components/stories/StoriesStrip.tsx
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Fix chat theme mode references"
            git push
          fi
