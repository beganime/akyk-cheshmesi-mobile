name: Apply chat list theme fix

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-chat-list-theme.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-theme-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch chat and contact list themes
        run: |
          node <<'NODE'
          const fs = require('fs');

          const workflowPath = '.github/workflows/apply-chat-list-theme.yml';
          const appThemeImport = "import type { AppTheme } from '@/src/theme/themes';\n";

          function ensureImport(source) {
            if (source.includes(appThemeImport.trim())) {
              return source;
            }

            const marker = "import { useTheme } from '@/src/theme/ThemeProvider';\n";
            if (!source.includes(marker)) {
              throw new Error('useTheme import marker not found');
            }

            return source.replace(marker, marker + appThemeImport);
          }

          function replaceExact(source, from, to, label) {
            if (source.includes(to)) {
              return source;
            }

            if (!source.includes(from)) {
              throw new Error(`${label} pattern not found`);
            }

            return source.replace(from, to);
          }

          function patchChats() {
            const path = 'app/(app)/(tabs)/chats.tsx';
            let source = fs.readFileSync(path, 'utf8');

            source = ensureImport(source);

            if (!source.includes('function buildChatUi(theme: AppTheme): ChatUi')) {
              source = source.replace(
                /const CHAT_UI: Record<'dark' \| 'light', ChatUi> = \{[\s\S]*?\n\};\n\nconst AVATAR_COLORS/,
                `function buildChatUi(theme: AppTheme): ChatUi {\n  const colors = theme.colors;\n\n  return {\n    bgPrimary: colors.background,\n    bgSecondary: colors.cardStrong,\n    bgHover: colors.primarySoft,\n    accent: colors.primary,\n    textPrimary: colors.text,\n    textSecondary: colors.muted,\n    separator: colors.border,\n    badgeBg: colors.primary,\n    shadow: colors.shadow,\n    overlay: theme.isDark ? 'rgba(0, 0, 0, 0.34)' : 'rgba(15, 23, 42, 0.16)',\n    danger: colors.danger,\n    success: colors.success,\n    pageOuter: colors.background,\n  };\n}\n\nconst AVATAR_COLORS`,
              );
            }

            source = replaceExact(
              source,
              'const { resolvedThemeName, setThemeMode } = useTheme();',
              'const { theme, setThemeMode } = useTheme();',
              'Chats useTheme',
            );

            source = replaceExact(
              source,
              "  const isLightTheme = resolvedThemeName.toLowerCase().includes('light');\n  const ui = isLightTheme ? CHAT_UI.light : CHAT_UI.dark;",
              '  const ui = useMemo(() => buildChatUi(theme), [theme]);',
              'Chats ui selector',
            );

            source = replaceExact(
              source,
              "    const nextMode = isLightTheme ? 'dark' : 'light';",
              "    const nextMode = theme.isDark ? 'light' : 'dark';",
              'Chats day/night switch',
            );

            fs.writeFileSync(path, source);
          }

          function patchContacts() {
            const path = 'app/(app)/(tabs)/contacts.tsx';
            let source = fs.readFileSync(path, 'utf8');

            source = ensureImport(source);

            if (!source.includes('function buildContactUi(theme: AppTheme): ContactUi')) {
              source = source.replace(
                /const CONTACT_UI: Record<'dark' \| 'light', ContactUi> = \{[\s\S]*?\n\};\n\nconst AVATAR_COLORS/,
                `function buildContactUi(theme: AppTheme): ContactUi {\n  const colors = theme.colors;\n\n  return {\n    bgPrimary: colors.background,\n    bgSecondary: colors.cardStrong,\n    bgHover: colors.primarySoft,\n    accent: colors.primary,\n    textPrimary: colors.text,\n    textSecondary: colors.muted,\n    separator: colors.border,\n    badgeBg: colors.primary,\n    shadow: colors.shadow,\n    overlay: theme.isDark ? 'rgba(0, 0, 0, 0.34)' : 'rgba(15, 23, 42, 0.16)',\n    danger: colors.danger,\n    success: colors.success,\n    pageOuter: colors.background,\n  };\n}\n\nconst AVATAR_COLORS`,
              );
            }

            source = replaceExact(
              source,
              'const { resolvedThemeName } = useTheme();',
              'const { theme } = useTheme();',
              'Contacts useTheme',
            );

            source = replaceExact(
              source,
              "  const isLightTheme = resolvedThemeName.toLowerCase().includes('light');\n  const ui = isLightTheme ? CONTACT_UI.light : CONTACT_UI.dark;",
              '  const ui = useMemo(() => buildContactUi(theme), [theme]);',
              'Contacts ui selector',
            );

            fs.writeFileSync(path, source);
          }

          patchChats();
          patchContacts();

          if (fs.existsSync(workflowPath)) {
            fs.rmSync(workflowPath);
          }
          NODE

      - name: Commit patched files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/'(app)'/'(tabs)'/chats.tsx app/'(app)'/'(tabs)'/contacts.tsx .github/workflows/apply-chat-list-theme.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Apply app theme to chat and contact lists"
            git push
          fi
